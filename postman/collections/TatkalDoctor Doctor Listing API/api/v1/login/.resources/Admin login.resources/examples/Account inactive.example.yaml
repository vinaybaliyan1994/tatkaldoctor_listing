$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/login"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "email": "superadmin@tatkaldoctor.com",
        "password": "Admin@1234"
      }
response:
  statusCode: 403
  statusText: Forbidden
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "success": false,
        "message": "Your account is inactive."
      }
order: 2000
