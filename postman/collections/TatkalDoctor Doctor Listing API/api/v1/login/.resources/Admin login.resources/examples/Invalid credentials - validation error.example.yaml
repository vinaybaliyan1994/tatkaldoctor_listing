$kind: http-example
name: Invalid credentials / validation error
request:
  url: "{{baseUrl}}/api/v1/login"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "email": "superadmin@tatkaldoctor.com",
        "password": "Admin@1234"
      }
response:
  statusCode: 422
  statusText: Unprocessable Entity (WebDAV) (RFC 4918)
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "success": false,
        "message": "Validation failed.",
        "errors": {
          "email": [
            "The provided credentials are incorrect.",
            "The provided credentials are incorrect."
          ]
        }
      }
order: 3000
