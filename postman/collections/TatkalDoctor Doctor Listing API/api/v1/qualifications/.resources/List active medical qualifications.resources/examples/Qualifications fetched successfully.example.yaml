$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/qualifications"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: X-Api-Key
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "success": true,
        "message": "Qualifications fetched successfully",
        "data": [
          {
            "id": 1,
            "qualification": "MBBS"
          },
          {
            "id": 1,
            "qualification": "MBBS"
          }
        ]
      }
order: 1000
