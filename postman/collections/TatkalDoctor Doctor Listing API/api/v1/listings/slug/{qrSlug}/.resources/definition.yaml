$kind: collection
name: "{qrSlug}"
scripts:
  - type: http:beforeRequest
    code: "const apiKey    = pm.collectionVariables.get('api_key');\r

      const secretKey = pm.collectionVariables.get('secret_key');\r

      \r

      const method    = pm.request.method.toUpperCase();\r

      const timestamp = Math.floor(Date.now() / 1000).toString();\r

      const nonce     = Math.random().toString(36).substring(2) + Date.now().toString(36);\r

      const path      = pm.request.url.getPath();\r

      \r

      const body     = (pm.request.body && pm.request.body.raw) ? pm.request.body.raw : '';\r

      const bodyHash = CryptoJS.SHA256(body).toString(CryptoJS.enc.Hex);\r

      \r

      const stringToSign = [method, timestamp, nonce, path, bodyHash].join('\\n');\r

      const signature    = CryptoJS.HmacSHA256(stringToSign, secretKey).toString(CryptoJS.enc.Hex);\r

      \r

      pm.request.headers.upsert({ key: 'X-Api-Key',   value: apiKey });\r

      pm.request.headers.upsert({ key: 'X-Timestamp', value: timestamp });\r

      pm.request.headers.upsert({ key: 'X-Nonce',     value: nonce });\r

      pm.request.headers.upsert({ key: 'X-Signature', value: signature });\r\n"
order: 1000
