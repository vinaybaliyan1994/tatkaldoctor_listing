$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/cities/:country_code"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: X-Api-Key
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: country_code
      value: IND
      description: ISO 3166-1 alpha-3 country code (case-insensitive, e.g. IND, USA, GBR)
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "success": false,
        "message": "Country code \"XYZ\" not found."
      }
order: 3000
