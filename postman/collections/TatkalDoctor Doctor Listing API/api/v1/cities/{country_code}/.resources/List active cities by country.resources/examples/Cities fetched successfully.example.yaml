$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/cities/:country_code"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: X-Api-Key
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: country_code
      value: IND
      description: ISO 3166-1 alpha-3 country code (case-insensitive, e.g. IND, USA, GBR)
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "success": true,
        "message": "Cities fetched successfully",
        "data": [
          {
            "id": 1,
            "name": "Mumbai",
            "country_code": "IND"
          },
          {
            "id": 1,
            "name": "Mumbai",
            "country_code": "IND"
          }
        ]
      }
order: 1000
